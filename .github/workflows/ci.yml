name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Build
        run: make build

  tests-linux-full:
    name: Linux Full Validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Unit tests
        run: make test-unit

      - name: Golden tests
        run: make test-golden

      - name: Execution tests
        run: make test-exec

      - name: E7 tests
        run: make test-e7

      - name: E8 verification gates
        run: make test-e8

      - name: Upload E8 concurrency stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-concurrency-stress-linux
          path: |
            target/e8/concurrency-stress-report.json
            target/e8/concurrency-stress-schedule.json
            target/e8/concurrency-stress-replay.txt
          if-no-files-found: ignore

      - name: E9 release and security tests
        run: make test-e9

      - name: Intrinsic placeholder guard
        run: make intrinsic-placeholder-guard

      - name: Verify intrinsic bindings
        run: make verify-intrinsics

      - name: Example checks
        run: make examples-check

      - name: Example runs
        run: make examples-run

      - name: Integration harness offline replay gate
        run: make integration-harness-offline

      - name: Integration harness live smoke (opt-in)
        if: vars.AIC_ENABLE_INTEGRATION_LIVE == '1'
        env:
          AIC_INTEGRATION_LIVE: "1"
          AIC_INTEGRATION_SERVICES: ${{ vars.AIC_INTEGRATION_SERVICES }}
          AIC_INTEGRATION_MAX_CASES: ${{ vars.AIC_INTEGRATION_MAX_CASES }}
        run: make integration-harness-live

      - name: Upload integration harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-harness-linux
          path: target/e8/integration-harness-report.json
          if-no-files-found: ignore

      - name: CLI smoke
        run: make cli-smoke

      - name: Docs checks
        run: make docs-check

      - name: Security audit
        run: make security-audit

      - name: LTS policy gate
        run: cargo run --quiet --bin aic -- release lts --check

      - name: Reproducibility manifest check
        run: make repro-check

      - name: Upload E8 perf report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-perf-report-linux
          path: target/e8/perf-report.json
          if-no-files-found: ignore

      - name: Upload E8 REST runtime soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-rest-runtime-soak-linux
          path: |
            target/e8/rest-runtime-soak-report.json
            target/e8/rest-runtime-soak-report-linux.json
          if-no-files-found: ignore

  execution-matrix:
    name: Execution Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Run host execution matrix suite
        run: cargo test --locked --test e8_matrix_tests

      - name: Run string Unicode conformance suite
        run: cargo test --locked --test execution_tests exec_string_unicode_conformance_and_utf8_invariants -- --exact

      - name: Run seeded fuzz gate (includes formatter roundtrip target)
        run: cargo test --locked --test e8_fuzz_tests fuzz_seeded_corpus_has_no_panics -- --exact

      - name: Run host perf gate suite
        run: cargo test --locked --test e8_perf_tests

      - name: Run host REST runtime perf/soak gate suite
        run: make test-e8-rest-runtime-soak

      - name: Upload E8 perf trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-perf-${{ matrix.os }}
          path: |
            target/e8/perf-report.json
            target/e8/perf-report-*.json
            target/e8/perf-trend-*.json
            target/e8/rest-runtime-soak-report.json
            target/e8/rest-runtime-soak-report-*.json
          if-no-files-found: ignore

  execution-windows-smoke:
    name: Windows Runtime Smoke
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Process runtime smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_proc_run_pipe_spawn_wait_and_kill -- --exact

      - name: Process runtime env/cwd/timeout smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_proc_run_with_stdin_env_cwd_and_timeout -- --exact

      - name: Process runtime pipe/is-running smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_proc_pipe_chain_is_running_and_current_pid -- --exact

      - name: Net runtime loopback smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_net_tcp_loopback_echo -- --exact

      - name: Net runtime async lifecycle smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_net_async_wait_negative_paths_are_stable -- --exact

      - name: Concurrency runtime smoke
        shell: pwsh
        run: cargo test --locked --test execution_tests exec_concurrency_worker_pool_is_deterministic -- --exact

      - name: Windows target net object smoke
        shell: pwsh
        run: cargo test --locked --test e7_build_hermetic_tests build_windows_target_allows_net_effect_usage_without_e6007 -- --exact

  cross-platform-build:
    name: Cross Platform Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Build with explicit host target (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          arch="$(uname -m)"
          os="$(uname -s)"
          case "${os}/${arch}" in
            Linux/x86_64) target="x86_64-linux" ;;
            Linux/aarch64|Linux/arm64) target="aarch64-linux" ;;
            Darwin/x86_64) target="x86_64-macos" ;;
            Darwin/arm64) target="aarch64-macos" ;;
            *)
              echo "unsupported host for explicit --target smoke: ${os}/${arch}" >&2
              exit 1
              ;;
          esac
          cargo run --quiet --bin aic -- \
            build examples/core/cross_compile_targets.aic \
            --target "$target" \
            -o target/cross-target-smoke

      - name: Build with explicit host target (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo run --quiet --bin aic -- build examples/core/cross_compile_targets.aic --target x86_64-windows -o target/cross-target-smoke.exe

      - name: Cross-target object matrix smoke (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          targets=(
            x86_64-linux
            aarch64-linux
            x86_64-macos
            aarch64-macos
            x86_64-windows
          )
          for target in "${targets[@]}"; do
            cargo run --quiet --bin aic -- \
              build examples/core/cross_compile_targets.aic \
              --artifact obj \
              --target "$target" \
              -o "target/cross-target-${target}.o"
          done

      - name: Cross-target object matrix smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targets = @(
            "x86_64-linux",
            "aarch64-linux",
            "x86_64-macos",
            "aarch64-macos",
            "x86_64-windows"
          )
          foreach ($target in $targets) {
            cargo run --quiet --bin aic -- build examples/core/cross_compile_targets.aic --artifact obj --target $target -o "target/cross-target-$target.o"
          }

      - name: Library tests
        run: cargo test --locked --lib

  vscode-extension:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/vscode-aic/package.json

      - name: Install extension dependencies
        working-directory: tools/vscode-aic
        run: npm install

      - name: Build extension
        working-directory: tools/vscode-aic
        run: npm run build

      - name: Test extension
        working-directory: tools/vscode-aic
        run: xvfb-run -a npm test

  status-summary:
    name: CI Status Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality
      - tests-linux-full
      - execution-matrix
      - cross-platform-build
      - vscode-extension
    steps:
      - name: Validate job outcomes
        run: |
          set -euo pipefail
          echo "quality=${{ needs.quality.result }}"
          echo "tests-linux-full=${{ needs.tests-linux-full.result }}"
          echo "execution-matrix=${{ needs.execution-matrix.result }}"
          echo "cross-platform-build=${{ needs.cross-platform-build.result }}"
          echo "vscode-extension=${{ needs.vscode-extension.result }}"

          [[ "${{ needs.quality.result }}" == "success" ]]
          [[ "${{ needs.tests-linux-full.result }}" == "success" ]]
          [[ "${{ needs.execution-matrix.result }}" == "success" ]]
          [[ "${{ needs.cross-platform-build.result }}" == "success" ]]
          [[ "${{ needs.vscode-extension.result }}" == "success" ]]
