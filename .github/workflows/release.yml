name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Full CI gate
        run: make ci

      - name: Release policy gate
        run: cargo run --quiet --bin aic -- release policy --check

      - name: LTS policy gate
        run: cargo run --quiet --bin aic -- release lts --check

      - name: Security audit gate
        run: cargo run --quiet --bin aic -- release security-audit --json

  release-selfhost-bootstrap:
    name: Release Self-Host Bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release-preflight
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      AIC_SELFHOST_BOOTSTRAP_TIMEOUT: "3600"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install clang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Host tool preflight
        shell: bash
        run: |
          set -euo pipefail
          command -v cargo
          cargo --version
          command -v clang
          clang --version
          command -v strip
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            command -v codesign
            codesign -h >/dev/null 2>&1 || true
            echo "codesign: available"
          fi

      - name: Supported self-host bootstrap gate
        run: make selfhost-bootstrap

      - name: Self-host release provenance gate
        run: make selfhost-release-provenance

      - name: Self-host compiler mode gate
        run: make selfhost-mode-check

      - name: Upload self-host bootstrap reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-selfhost-bootstrap-${{ matrix.os }}
          path: |
            target/selfhost-bootstrap/report.json
            target/selfhost-bootstrap/performance-report.json
            target/selfhost-bootstrap/performance-trend.json
            target/selfhost-bootstrap/parity-report.json
            target/selfhost-bootstrap/stage-matrix-report.json
            target/selfhost-bootstrap/parity-artifacts/**
            target/selfhost-bootstrap/stage-matrix-artifacts/**
            target/selfhost-bootstrap/stage0/aic_selfhost
            target/selfhost-bootstrap/stage1/aic_selfhost
            target/selfhost-bootstrap/stage2/aic_selfhost
            target/selfhost-release/**
          if-no-files-found: ignore

  release-build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - release-preflight
      - release-selfhost-bootstrap
    env:
      AIC_SIGNING_KEY: ${{ secrets.AIC_SIGNING_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: aic
            archive_ext: tar.gz
          - os: macos-latest
            bin_name: aic
            archive_ext: tar.gz
          - os: windows-latest
            bin_name: aic.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --locked --bin aic

      - name: Compute release target tag
        shell: bash
        run: |
          set -euo pipefail
          OS_NAME="$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          ARCH_NAME="$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')"
          echo "TARGET_TAG=${OS_NAME}-${ARCH_NAME}" >> "$GITHUB_ENV"

      - name: Generate release metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cargo run --quiet --bin aic -- release manifest --root . --output "dist/repro-manifest-${TARGET_TAG}.json" --source-date-epoch 1700000000
          cargo run --quiet --bin aic -- release sbom --root . --output "dist/sbom-${TARGET_TAG}.json" --source-date-epoch 1700000000
          cargo run --quiet --bin aic -- release policy --check
          cargo run --quiet --bin aic -- release lts --check

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="aicore-${GITHUB_REF_NAME}-${TARGET_TAG}.tar.gz"

          mkdir -p dist
          cp "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          tar -C dist -czf "$ARCHIVE" "${{ matrix.bin_name }}"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archive = "aicore-$env:GITHUB_REF_NAME-$env:TARGET_TAG.zip"

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          Compress-Archive -Path "dist/${{ matrix.bin_name }}" -DestinationPath $archive -Force

          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -FilePath "$archive.sha256" -Encoding ascii
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Smoke test binary (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/aic --help >/dev/null
          ./target/release/aic check examples/option_match.aic >/dev/null

      - name: Smoke test binary (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          & "target/release/aic.exe" --help | Out-Null
          & "target/release/aic.exe" check "examples/option_match.aic" | Out-Null

      - name: Verify archive checksum (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/aic release verify-checksum \
            --artifact "$ARCHIVE" \
            --checksum "$ARCHIVE.sha256"

      - name: Verify archive checksum (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          & "target/release/aic.exe" release verify-checksum `
            --artifact "$env:ARCHIVE" `
            --checksum "$env:ARCHIVE.sha256"

      - name: Sign provenance metadata
        if: env.AIC_SIGNING_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --bin aic -- release provenance \
            --artifact "dist/${{ matrix.bin_name }}" \
            --sbom "dist/sbom-${TARGET_TAG}.json" \
            --manifest "dist/repro-manifest-${TARGET_TAG}.json" \
            --output "dist/provenance-${TARGET_TAG}.json" \
            --key-env AIC_SIGNING_KEY \
            --key-id "github-actions-${{ runner.os }}-${{ runner.arch }}"

      - name: Verify provenance signature
        if: env.AIC_SIGNING_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet --bin aic -- release verify-provenance \
            --provenance "dist/provenance-${TARGET_TAG}.json" \
            --key-env AIC_SIGNING_KEY

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            dist/repro-manifest-*.json
            dist/sbom-*.json
            dist/provenance-*.json

  release-publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: release-build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: false

      - name: Display files
        run: find dist -maxdepth 3 -type f | sort

      - name: Build release metadata notes
        run: |
          set -euo pipefail
          NOTES="dist/release-metadata.md"
          {
            echo "# Reproducibility Metadata"
            echo
            echo "Source date epoch: \`1700000000\`"
            echo
            echo "| Artifact | SHA256 | Manifest Digest | SBOM Digest | Provenance Signature |"
            echo "|---|---|---|---|---|"
            for sha_file in dist/release-*/*.sha256; do
              [ -f "$sha_file" ] || continue
              artifact_name="$(basename "${sha_file%.sha256}")"
              sha="$(awk '{print $1}' "$sha_file")"
              dir="$(dirname "$sha_file")"
              manifest_file="$(ls "$dir"/repro-manifest-*.json 2>/dev/null | head -n1 || true)"
              sbom_file="$(ls "$dir"/sbom-*.json 2>/dev/null | head -n1 || true)"
              provenance_file="$(ls "$dir"/provenance-*.json 2>/dev/null | head -n1 || true)"
              manifest_digest="n/a"
              sbom_digest="n/a"
              provenance_signature="n/a"
              if [ -n "$manifest_file" ]; then
                manifest_digest="$(jq -r '.digest // \"n/a\"' "$manifest_file")"
              fi
              if [ -n "$sbom_file" ]; then
                sbom_digest="$(jq -r '.digest // \"n/a\"' "$sbom_file")"
              fi
              if [ -n "$provenance_file" ]; then
                provenance_signature="$(jq -r '.signature // \"n/a\"' "$provenance_file")"
              fi
              echo "| \`$artifact_name\` | \`$sha\` | \`$manifest_digest\` | \`$sbom_digest\` | \`$provenance_signature\` |"
            done
          } > "$NOTES"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.sha256
            dist/**/*.json
          body_path: dist/release-metadata.md
          generate_release_notes: true
