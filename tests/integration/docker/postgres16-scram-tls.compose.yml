services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aic
      POSTGRES_PASSWORD: aicpass
      POSTGRES_DB: aicdb
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256 --auth-local=scram-sha-256
    ports:
      - "55432:5432"
    volumes:
      - ./postgres/init-tls.sh:/docker-entrypoint-initdb.d/10-init-tls.sh:ro
